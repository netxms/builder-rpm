name: Package and push to ghcr.io

on:
  push:
    branches:
      - "master"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { tag: epel8,    base_image: "oraclelinux:8",  distro_type: epel,   distro_version: "8" }
          - { tag: epel9,    base_image: "oraclelinux:9",  distro_type: epel,   distro_version: "9" }
          - { tag: epel10,   base_image: "oraclelinux:10", distro_type: epel,   distro_version: "10" }
          - { tag: fedora42, base_image: "fedora:42",      distro_type: fedora, distro_version: "42" }
          - { tag: fedora43, base_image: "fedora:43",      distro_type: fedora, distro_version: "43" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            DISTRO_TYPE=${{ matrix.distro_type }}
            DISTRO_VERSION=${{ matrix.distro_version }}
          tags: ghcr.io/${{ github.repository_owner }}/builder-rpm:${{ matrix.tag }}
